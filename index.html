<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associate Name Tag Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2d7a3a;--green-light:#3d9a4c;--green-filled:#1a5c26;
    --bg:#1a1a1a;--panel:#242424;--border:#333;
    --text:#e8e8e8;--muted:#888;--accent:#f5c842;
    --blue-btn:#4a9eff;--tag-blue:#1a4a8a;--tag-blue-filled:#0d2e5e;
    --trained-bg:#f5c842;--trained-text:#1a1a1a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:24px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:4px;color:var(--accent);margin-bottom:2px;}
  .subtitle{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
  .layout{display:grid;grid-template-columns:360px 1fr;gap:28px;max-width:1080px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:20px;}
  .panel h2{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  label{display:block;font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:'IBM Plex Mono',monospace;}
  input[type="text"]{width:100%;background:#111;border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:0.88rem;border-radius:2px;margin-bottom:12px;outline:none;transition:border-color 0.2s;}
  input[type="text"]:focus{border-color:var(--green-light);}
  .dept-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px;}
  .dept-btn{padding:7px 4px;border:1px solid var(--border);background:#111;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.68rem;letter-spacing:0.5px;cursor:pointer;border-radius:2px;transition:all 0.12s;text-align:center;user-select:none;}
  .dept-btn:hover{border-color:#666;color:var(--text);}
  .dept-btn.active{background:var(--trained-bg);border-color:#d4a800;color:var(--trained-text);font-weight:700;}
  .photo-area{width:100%;background:#111;border:2px dashed var(--border);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:12px;overflow:hidden;position:relative;transition:border-color 0.2s;height:130px;}
  .photo-area:hover{border-color:var(--green-light);}
  .photo-area img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .photo-placeholder{color:var(--muted);font-size:0.68rem;letter-spacing:1px;text-align:center;font-family:'IBM Plex Mono',monospace;}
  .photo-placeholder .icon{font-size:1.5rem;margin-bottom:4px;}
  input[type="file"]{display:none;}
  .btn{width:100%;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;padding:11px;cursor:pointer;border-radius:2px;transition:all 0.2s;margin-top:6px;font-size:1.05rem;border:none;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:var(--green-light);}
  .btn-dl{background:transparent;border:1px solid var(--blue-btn)!important;color:var(--blue-btn);}
  .btn-dl:hover:not(:disabled){background:var(--blue-btn);color:#000;}
  .btn-outline{background:transparent;border:1px solid var(--accent)!important;color:var(--accent);}
  .btn-outline:hover{background:var(--accent);color:#000;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .type-wrap{display:flex;gap:8px;margin-bottom:12px;}
  .type-btn{flex:1;padding:8px 4px;border:1px solid var(--border);background:#111;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.65rem;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all 0.15s;}
  .type-btn.on-green{border-color:var(--green-light);background:var(--green-filled);color:#fff;}
  .type-btn.on-blue{border-color:var(--blue-btn);background:var(--tag-blue-filled);color:#7ec8ff;}

  /* ── Preview tag ── */
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;}
  .tag-container{background:#2a2a2a;border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;align-items:center;}

  /* Tag sized to match the blue one in screenshot */
  .name-tag{width:380px;background:var(--green);border-radius:4px;padding:5px;display:flex;gap:5px;box-shadow:0 4px 18px rgba(0,0,0,.5);}
  .name-tag.blue-tag{background:var(--tag-blue);}
  .tag-photo{width:58px;min-width:58px;border-radius:2px;overflow:hidden;}
  .tag-photo img{width:58px;height:72px;object-fit:cover;display:block;}
  .tag-photo-placeholder{width:58px;height:72px;background:#bbb;display:flex;align-items:center;justify-content:center;color:#666;font-size:1.2rem;}
  .tag-body{flex:1;display:flex;flex-direction:column;gap:3px;}
  .tag-rows{display:flex;flex-direction:column;gap:2px;}
  .tag-row{display:flex;gap:2px;}
  .tag-cell{background:rgba(255,255,255,.12);border-radius:1px;padding:2px;font-size:.42rem;letter-spacing:.3px;text-transform:uppercase;color:rgba(255,255,255,.38);text-align:center;flex:1;min-height:18px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;}
  .tag-cell.trained{background:var(--trained-bg);color:var(--trained-text);font-weight:700;}

  /* Bottom row: name BIG, username same size smaller weight, mgr smaller still */
  .tag-bottom{padding:3px 2px 2px;display:flex;flex-direction:column;gap:1px;}
  .tag-name-line{display:flex;align-items:baseline;gap:6px;}
  .tag-name{font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:700;color:#000;letter-spacing:.3px;}
  .tag-username{font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:700;color:#000;letter-spacing:.3px;}
  .tag-manager{font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:700;color:#000;letter-spacing:.2px;}
  .tag-days{display:flex;flex-wrap:wrap;gap:1px;padding:1px 2px 0;}
  .tag-day-pill{background:#f5c842;color:#1a1a1a;font-family:'IBM Plex Mono',monospace;font-size:.36rem;font-weight:700;padding:0px 3px;border-radius:1px;letter-spacing:.2px;}
  .day-btn{padding:5px 2px;border:1px solid var(--border);background:#111;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.62rem;cursor:pointer;border-radius:2px;transition:all 0.12s;text-align:center;user-select:none;}
  .day-btn.active{background:#f5c842;border-color:#d4a800;color:#1a1a1a;font-weight:700;}

  .saved-wrap{width:100%;}
  .saved-header{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .saved-tags{display:flex;flex-wrap:wrap;gap:16px;}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a4d22;border:1px solid var(--green-light);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:.75rem;padding:10px 18px;border-radius:4px;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<h1>Name Tag Maker</h1>
<p class="subtitle">Associate Training Badge Generator</p>

<div class="layout">
  <div>
    <div class="panel">
      <h2>Associate Info</h2>
      <label>Last Name, First Name</label>
      <input type="text" id="fullName" placeholder="e.g. patel, jinalben" oninput="updatePreview()">
      <label>Username / ID</label>
      <input type="text" id="username" placeholder="e.g. jinalbee" oninput="updatePreview()">
      <label>Manager Name</label>
      <input type="text" id="manager" placeholder="e.g. smith, john" oninput="updatePreview()">
      <label>Employment Type</label>
      <div class="type-wrap">
        <button id="typeTemp" class="type-btn on-green" onclick="setType('temp')">🟢 Seasonal / Temp</button>
        <button id="typePerm" class="type-btn" onclick="setType('perm')">🔵 Permanent</button>
      </div>
      <div id="dayWrap" style="display:none;margin-bottom:12px;">
        <label>Work Days</label>
        <div id="dayGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;"></div>
      </div>
      <label>Photo (optional)</label>
      <div class="photo-area" id="photoArea" onclick="document.getElementById('photoInput').click()">
        <div class="photo-placeholder"><div class="icon">📷</div><div>Click to upload</div></div>
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <label>Departments Trained In</label>
      <div class="dept-grid" id="deptGrid"></div>
      <button class="btn btn-green" onclick="saveTag()">＋ Save Tag</button>
      <button class="btn btn-dl" id="downloadBtn" onclick="downloadDocx()" disabled>⬇ Download Saved Tags (.docx)</button>
      <button class="btn btn-outline" onclick="window.print()">🖨 Print Preview</button>
    </div>
  </div>
  <div>
    <div class="panel">
      <h2>Live Preview</h2>
      <div class="preview-wrap">
        <div class="tag-container"><div id="liveTag"></div></div>
        <div class="saved-wrap">
          <div class="saved-header" id="savedHeader">Saved Tags</div>
          <div class="saved-tags" id="savedTagsEl">
            <div style="color:var(--muted);font-size:.78rem;font-family:'IBM Plex Mono',monospace;">No tags saved yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DEPARTMENTS = ['PICK','WS','PS','SD','ARSAW','STOW','PACK','PP','PG','AFM','SINGLES','RECIEVE'];
const ROW1 = ['PICK','WS','PS','SD','ARSAW','STOW'];
const ROW2 = ['PACK','PP','PG','AFM','SINGLES','RECIEVE'];

let selectedDepts = new Set();
let photoDataUrl = null;
let savedTags = [];
let isPermanent = false;
let selectedDays = new Set();

const grid = document.getElementById('deptGrid');
DEPARTMENTS.forEach(key => {
  const btn = document.createElement('button');
  btn.className = 'dept-btn';
  btn.textContent = key;
  btn.onclick = () => {
    selectedDepts.has(key) ? selectedDepts.delete(key) : selectedDepts.add(key);
    btn.classList.toggle('active', selectedDepts.has(key));
    updatePreview();
  };
  grid.appendChild(btn);
});

// Build day toggle buttons
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const dayGrid = document.getElementById('dayGrid');
DAYS.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'day-btn';
  btn.textContent = d;
  btn.onclick = () => {
    selectedDays.has(d) ? selectedDays.delete(d) : selectedDays.add(d);
    btn.classList.toggle('active', selectedDays.has(d));
    updatePreview();
  };
  dayGrid.appendChild(btn);
});

function setType(type) {
  isPermanent = type === 'perm';
  document.getElementById('typeTemp').className = 'type-btn' + (!isPermanent ? ' on-green' : '');
  document.getElementById('typePerm').className = 'type-btn' + (isPermanent ? ' on-blue' : '');
  document.getElementById('dayWrap').style.display = isPermanent ? 'block' : 'none';
  if (!isPermanent) { selectedDays.clear(); dayGrid.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active')); }
  updatePreview();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataUrl = ev.target.result;
    document.getElementById('photoArea').innerHTML = '<img src="' + ev.target.result + '">';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function cellHTML(key, depts) {
  if (!key) return '<div class="tag-cell" style="background:transparent;"></div>';
  return '<div class="tag-cell ' + (depts.has(key) ? 'trained' : '') + '">' + key + '</div>';
}

function buildTagHTML(name, username, manager, depts, photo, perm, days) {
  const photoHTML = photo
    ? '<div class="tag-photo"><img src="' + photo + '"></div>'
    : '<div class="tag-photo"><div class="tag-photo-placeholder">👤</div></div>';
  return '<div class="name-tag' + (perm ? ' blue-tag' : '') + '">'
    + photoHTML
    + '<div class="tag-body">'
    + '<div class="tag-rows">'
    + '<div class="tag-row">' + ROW1.map(k => cellHTML(k, depts)).join('') + '</div>'
    + '<div class="tag-row">' + ROW2.map(k => cellHTML(k, depts)).join('') + '</div>'
    + '</div>'
    + '<div class="tag-bottom">'
    + '<div class="tag-name-line">'
    + '<span class="tag-name">' + (name || 'last, first') + '</span>'
    + '<span class="tag-username">' + (username || 'id') + '</span>'
    + '</div>'
    + (manager ? '<div class="tag-manager">MGR: ' + manager + '</div>' : '')
    + (perm && days && days.size ? '<div class="tag-days">' + [...days].sort((a,b)=>DAYS.indexOf(a)-DAYS.indexOf(b)).map(d => '<span class="tag-day-pill">' + d + '</span>').join('') + '</div>' : '')
    + '</div>'
    + '</div>'
    + '</div>';
}

function updatePreview() {
  document.getElementById('liveTag').innerHTML = buildTagHTML(
    document.getElementById('fullName').value,
    document.getElementById('username').value,
    document.getElementById('manager').value,
    selectedDepts, photoDataUrl, isPermanent, isPermanent ? selectedDays : null
  );
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveTag() {
  const name = document.getElementById('fullName').value.trim();
  if (!name) { alert('Please enter a name first.'); return; }
  savedTags.push({
    name,
    username: document.getElementById('username').value.trim(),
    manager:  document.getElementById('manager').value.trim(),
    depts:    new Set(selectedDepts),
    photo:    photoDataUrl,   // store full data URL — embedded in docx
    permanent: isPermanent,
    days: isPermanent ? new Set(selectedDays) : null
  });
  renderSaved();
  showToast('✓ Saved: ' + name);
}

function renderSaved() {
  const container = document.getElementById('savedTagsEl');
  const btn = document.getElementById('downloadBtn');
  document.getElementById('savedHeader').textContent = savedTags.length
    ? 'Saved Tags (' + savedTags.length + ')' : 'Saved Tags';
  btn.disabled = savedTags.length === 0;
  container.innerHTML = '';
  if (!savedTags.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:.78rem;font-family:\'IBM Plex Mono\',monospace;">No tags saved yet.</div>';
    return;
  }
  savedTags.forEach((tag, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:inline-flex;flex-direction:column;gap:4px;align-items:center;';
    const tagDiv = document.createElement('div');
    tagDiv.style.cssText = 'transform:scale(0.5);transform-origin:top left;margin-bottom:-60px;margin-right:-192px;';
    tagDiv.innerHTML = buildTagHTML(tag.name, tag.username, tag.manager, tag.depts, tag.photo, tag.permanent, tag.days);
    const del = document.createElement('button');
    del.textContent = '✕ Remove';
    del.style.cssText = 'font-family:"IBM Plex Mono",monospace;font-size:.6rem;background:transparent;border:1px solid #444;color:#888;padding:2px 8px;cursor:pointer;border-radius:2px;margin-top:58px;';
    del.onclick = () => { savedTags.splice(i, 1); renderSaved(); };
    wrap.appendChild(tagDiv);
    wrap.appendChild(del);
    container.appendChild(wrap);
  });
}

// ─── Native ZIP writer ────────────────────────────────────────────────────────

function crc32(data) {
  if (!crc32._t) {
    crc32._t = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let c = i;
      for (let j = 0; j < 8; j++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
      crc32._t[i] = c;
    }
  }
  let c = 0xffffffff;
  for (let i = 0; i < data.length; i++) c = crc32._t[(c ^ data[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

function u16(n) { return [n & 0xff, (n >> 8) & 0xff]; }
function u32(n) { n = n >>> 0; return [n & 0xff, (n >> 8) & 0xff, (n >> 16) & 0xff, (n >> 24) & 0xff]; }

function buildZip(files) {
  const enc = s => new TextEncoder().encode(s);
  const localParts = [];
  const centralEntries = [];
  let offset = 0;

  for (const f of files) {
    const name = enc(f.name);
    const data = f.data instanceof Uint8Array ? f.data : enc(f.data);
    const crc  = crc32(data);
    const sz   = data.length;

    const local = new Uint8Array([
      0x50,0x4b,0x03,0x04, 0x14,0x00, 0x00,0x00, 0x00,0x00,
      0x00,0x00, 0x21,0x00,
      ...u32(crc), ...u32(sz), ...u32(sz),
      ...u16(name.length), 0x00,0x00,
      ...name
    ]);
    const central = new Uint8Array([
      0x50,0x4b,0x01,0x02, 0x3f,0x00, 0x14,0x00, 0x00,0x00, 0x00,0x00,
      0x00,0x00, 0x21,0x00,
      ...u32(crc), ...u32(sz), ...u32(sz),
      ...u16(name.length), 0x00,0x00, 0x00,0x00, 0x00,0x00, 0x00,0x00,
      0x00,0x00,0x00,0x00,
      ...u32(offset),
      ...name
    ]);

    localParts.push({ local, data });
    centralEntries.push(central);
    offset += local.length + sz;
  }

  const cdSize = centralEntries.reduce((s, c) => s + c.length, 0);
  const eocd = new Uint8Array([
    0x50,0x4b,0x05,0x06, 0x00,0x00, 0x00,0x00,
    ...u16(files.length), ...u16(files.length),
    ...u32(cdSize), ...u32(offset), 0x00,0x00
  ]);

  const total = offset + cdSize + eocd.length;
  const out = new Uint8Array(total);
  let pos = 0;
  for (const { local, data } of localParts) {
    out.set(local, pos); pos += local.length;
    out.set(data,  pos); pos += data.length;
  }
  for (const c of centralEntries) { out.set(c, pos); pos += c.length; }
  out.set(eocd, pos);
  return out;
}

// ─── Photo helpers ────────────────────────────────────────────────────────────

// Convert dataURL → { base64: string, mediaType: string, ext: string }
function parseDataUrl(dataUrl) {
  const m = dataUrl.match(/^data:([^;]+);base64,(.+)$/);
  if (!m) return null;
  const mediaType = m[1];
  const base64 = m[2];
  const ext = mediaType.includes('png') ? 'png' : mediaType.includes('gif') ? 'gif' : 'jpeg';
  return { base64, mediaType, ext };
}

// base64 string → Uint8Array
function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// Resize image to max 200×250 px (keeps aspect), returns new dataURL
function resizePhoto(dataUrl, maxW, maxH) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxW / img.width, maxH / img.height, 1);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

// ─── DOCX XML builders ────────────────────────────────────────────────────────

function escXml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// imgRid = relationship ID for this tag's image (e.g. "rId2"), or null
// imgW, imgH = EMUs (1 inch = 914400 EMU, 1 cm = 360000 EMU)
function drawingXml(imgRid, widthEmu, heightEmu) {
  if (!imgRid) return '';
  return '<w:drawing>' +
    '<wp:inline distT="0" distB="0" distL="0" distR="0"' +
    ' xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing">' +
    '<wp:extent cx="' + widthEmu + '" cy="' + heightEmu + '"/>' +
    '<wp:effectExtent l="0" t="0" r="0" b="0"/>' +
    '<wp:docPr id="1" name="photo"/>' +
    '<wp:cNvGraphicFramePr>' +
    '<a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/>' +
    '</wp:cNvGraphicFramePr>' +
    '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">' +
    '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
    '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
    '<pic:nvPicPr><pic:cNvPr id="1" name="photo"/><pic:cNvPicPr/></pic:nvPicPr>' +
    '<pic:blipFill>' +
    '<a:blip r:embed="' + imgRid + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/>' +
    '<a:stretch><a:fillRect/></a:stretch>' +
    '</pic:blipFill>' +
    '<pic:spPr>' +
    '<a:xfrm><a:off x="0" y="0"/><a:ext cx="' + widthEmu + '" cy="' + heightEmu + '"/></a:xfrm>' +
    '<a:prstGeom prst="rect"><a:avLst/></a:prstGeom>' +
    '</pic:spPr>' +
    '</pic:pic>' +
    '</a:graphicData>' +
    '</a:graphic>' +
    '</wp:inline>' +
    '</w:drawing>';
}

function tagDocxXml(tag, imgRid) {
  const perm    = tag.permanent;
  const BASE    = perm ? '1A4A8A' : '2D7A3A';
  const DARK    = perm ? '0D2E5E' : '1A5C26';
  const TRFILL  = 'F5C842';
  const TRTEXT  = '1A1A1A';
  const UNFILL  = perm ? 'B8D4F0' : 'C8E6C9';
  const UNTEXT  = perm ? '0D2E5E' : '2D5A35';

  function nb() {
    return '<w:top w:val="none" w:sz="0" w:space="0" w:color="auto"/>' +
           '<w:left w:val="none" w:sz="0" w:space="0" w:color="auto"/>' +
           '<w:bottom w:val="none" w:sz="0" w:space="0" w:color="auto"/>' +
           '<w:right w:val="none" w:sz="0" w:space="0" w:color="auto"/>';
  }

  function deptCell(key, trained, blank) {
    const fill = blank ? BASE : (trained ? TRFILL : UNFILL);
    const fc   = trained ? TRTEXT : UNTEXT;
    const bold = trained ? '<w:b/>' : '';
    const rb   = blank
      ? '<w:right w:val="none" w:sz="0" w:space="0" w:color="auto"/>'
      : '<w:right w:val="single" w:sz="3" w:space="0" w:color="' + BASE + '"/>';
    return '<w:tc><w:tcPr>' +
      '<w:tcW w:w="840" w:type="dxa"/>' +
      '<w:tcBorders><w:top w:val="none" w:sz="0" w:space="0" w:color="auto"/>' +
      '<w:left w:val="none" w:sz="0" w:space="0" w:color="auto"/>' +
      '<w:bottom w:val="none" w:sz="0" w:space="0" w:color="auto"/>' + rb + '</w:tcBorders>' +
      '<w:shd w:val="clear" w:color="auto" w:fill="' + fill + '"/>' +
      '<w:tcMar><w:top w:w="30" w:type="dxa"/><w:left w:w="30" w:type="dxa"/>' +
      '<w:bottom w:w="30" w:type="dxa"/><w:right w:w="30" w:type="dxa"/></w:tcMar>' +
      '<w:vAlign w:val="center"/></w:tcPr>' +
      '<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="0"/></w:pPr>' +
      '<w:r><w:rPr>' + bold + '<w:color w:val="' + fc + '"/>' +
      '<w:sz w:val="11"/><w:szCs w:val="11"/>' +
      '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
      '<w:t>' + escXml(blank ? '' : key) + '</w:t></w:r></w:p></w:tc>';
  }

  // Photo column — shows embedded image if available, else placeholder text
  function photoCol(cont) {
    const inner = cont ? '<w:p/>' : (
      imgRid
        ? '<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="0"/></w:pPr>' +
          '<w:r>' + drawingXml(imgRid, 630000, 810000) + '</w:r></w:p>'
        : '<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:before="0" w:after="0"/></w:pPr>' +
          '<w:r><w:rPr><w:color w:val="BBBBBB"/><w:sz w:val="12"/>' +
          '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
          '<w:t>[ photo ]</w:t></w:r></w:p>'
    );
    return '<w:tc><w:tcPr>' +
      '<w:tcW w:w="900" w:type="dxa"/>' +
      (cont ? '<w:vMerge/>' : '<w:vMerge w:val="restart"/>') +
      '<w:tcBorders>' + nb() + '</w:tcBorders>' +
      '<w:shd w:val="clear" w:color="auto" w:fill="' + BASE + '"/>' +
      '<w:tcMar><w:top w:w="40" w:type="dxa"/><w:left w:w="40" w:type="dxa"/>' +
      '<w:bottom w:w="40" w:type="dxa"/><w:right w:w="40" w:type="dxa"/></w:tcMar>' +
      '<w:vAlign w:val="center"/></w:tcPr>' + inner + '</w:tc>';
  }

  const r1 = ROW1.map(k => deptCell(k, tag.depts.has(k), false)).join('');
  const r2 = ROW2.map(k => k === '' ? deptCell('', false, true) : deptCell(k, tag.depts.has(k), false)).join('');

  // Total width: 900 + 6×840 = 900+5040 = 5940 dxa
  // Row 3: photo col continues (vMerge), name spans only the 6 dept cols
  const photoColRow3 =
    '<w:tc><w:tcPr>' +
    '<w:tcW w:w="900" w:type="dxa"/>' +
    '<w:vMerge/>' +
    '<w:tcBorders>' + nb() + '</w:tcBorders>' +
    '<w:shd w:val="clear" w:color="auto" w:fill="' + BASE + '"/>' +
    '</w:tcPr><w:p/></w:tc>';

  const nameRow =
    photoColRow3 +
    '<w:tc><w:tcPr>' +
    '<w:tcW w:w="5040" w:type="dxa"/>' +
    '<w:gridSpan w:val="6"/>' +
    '<w:tcBorders>' + nb() + '</w:tcBorders>' +
    '<w:shd w:val="clear" w:color="auto" w:fill="' + BASE + '"/>' +
    '<w:tcMar><w:top w:w="50" w:type="dxa"/><w:left w:w="60" w:type="dxa"/>' +
    '<w:bottom w:w="50" w:type="dxa"/><w:right w:w="60" w:type="dxa"/></w:tcMar>' +
    '<w:vAlign w:val="center"/></w:tcPr>' +
    '<w:p><w:pPr><w:spacing w:before="0" w:after="0"/></w:pPr>' +
    '<w:r><w:rPr><w:b/><w:color w:val="000000"/><w:sz w:val="22"/><w:szCs w:val="22"/>' +
    '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
    '<w:t xml:space="preserve">' + escXml(tag.name) + '</w:t></w:r>' +
    (tag.username
      ? '<w:r><w:rPr><w:b/><w:color w:val="000000"/><w:sz w:val="22"/><w:szCs w:val="22"/>' +
        '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
        '<w:t xml:space="preserve">  ' + escXml(tag.username) + '</w:t></w:r>'
      : '') +
    (tag.manager
      ? '<w:r><w:rPr><w:b/><w:color w:val="000000"/><w:sz w:val="22"/><w:szCs w:val="22"/>' +
        '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
        '<w:t xml:space="preserve">  MGR: ' + escXml(tag.manager) + '</w:t></w:r>'
      : '') +
    (tag.days && tag.days.size
      ? '<w:r><w:rPr><w:b/><w:color w:val="1A1A1A"/><w:sz w:val="20"/><w:szCs w:val="20"/>' +
        '<w:highlight w:val="yellow"/>' +
        '<w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>' +
        '<w:t xml:space="preserve">  ' + [...tag.days].sort((a,b)=>['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(a)-['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(b)).join(' · ') + '</w:t></w:r>'
      : '') +
    '</w:p></w:tc>';

  return '<w:tbl>' +
    '<w:tblPr>' +
    '<w:tblW w:w="5940" w:type="dxa"/>' +
    '<w:tblBorders>' +
    '<w:top w:val="single" w:sz="12" w:space="0" w:color="000000"/>' +
    '<w:left w:val="single" w:sz="12" w:space="0" w:color="000000"/>' +
    '<w:bottom w:val="single" w:sz="12" w:space="0" w:color="000000"/>' +
    '<w:right w:val="single" w:sz="12" w:space="0" w:color="000000"/>' +
    '<w:insideH w:val="none"/><w:insideV w:val="none"/>' +
    '</w:tblBorders>' +
    '<w:tblCellMar><w:top w:w="0" w:type="dxa"/><w:left w:w="0" w:type="dxa"/>' +
    '<w:bottom w:w="0" w:type="dxa"/><w:right w:w="0" w:type="dxa"/></w:tblCellMar>' +
    '</w:tblPr>' +
    '<w:tblGrid>' +
    '<w:gridCol w:w="900"/>' +
    '<w:gridCol w:w="840"/><w:gridCol w:w="840"/><w:gridCol w:w="840"/>' +
    '<w:gridCol w:w="840"/><w:gridCol w:w="840"/><w:gridCol w:w="840"/>' +
    '</w:tblGrid>' +
    '<w:tr><w:trPr><w:trHeight w:val="280" w:hRule="exact"/></w:trPr>' + photoCol(false) + r1 + '</w:tr>' +
    '<w:tr><w:trPr><w:trHeight w:val="280" w:hRule="exact"/></w:trPr>' + photoCol(true)  + r2 + '</w:tr>' +
    '<w:tr><w:trPr><w:trHeight w:val="340" w:hRule="exact"/></w:trPr>' + nameRow + '</w:tr>' +
    '</w:tbl>';
}

// Build document.xml — needs tag list + array of imgRids (one per tag, null if no photo)
function buildDocumentXml(tags, imgRids) {
  // Add required namespaces for images
  const body = tags.map((tag, i) => {
    const spacer = i > 0 ? '<w:p><w:pPr><w:spacing w:before="120" w:after="0"/></w:pPr></w:p>' : '';
    const pgBreak = (i < tags.length - 1 && (i + 1) % 8 === 0)
      ? '<w:p><w:r><w:br w:type="page"/></w:r></w:p>' : '';
    return spacer + tagDocxXml(tag, imgRids[i]) + pgBreak;
  }).join('');

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<w:document' +
    ' xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"' +
    ' xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"' +
    ' xmlns:o="urn:schemas-microsoft-com:office:office"' +
    ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"' +
    ' xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"' +
    ' xmlns:v="urn:schemas-microsoft-com:vml"' +
    ' xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"' +
    ' xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"' +
    ' xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"' +
    ' xmlns:w15="http://schemas.microsoft.com/office/word/2012/wordml"' +
    ' mc:Ignorable="w14 w15">' +
    '<w:body>' + body +
    '<w:sectPr>' +
    '<w:pgSz w:w="12240" w:h="15840"/>' +
    '<w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720"/>' +
    '</w:sectPr>' +
    '</w:body></w:document>';
}

// Build word/_rels/document.xml.rels including image relationships
function buildWordRels(imgRids, imgPaths) {
  let rels =
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/>';
  for (let i = 0; i < imgRids.length; i++) {
    rels += '<Relationship Id="' + imgRids[i] + '"' +
      ' Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image"' +
      ' Target="' + imgPaths[i] + '"/>';
  }
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
    rels + '</Relationships>';
}

// Build [Content_Types].xml including image overrides
function buildContentTypes(imgExts) {
  const defaults =
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>';
  const overrides =
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
    '<Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>';
  // Add image content types (only once per extension)
  const seen = new Set();
  let imgDefaults = '';
  for (const ext of imgExts) {
    if (!seen.has(ext)) {
      seen.add(ext);
      const ct = ext === 'png' ? 'image/png' : ext === 'gif' ? 'image/gif' : 'image/jpeg';
      imgDefaults += '<Default Extension="' + ext + '" ContentType="' + ct + '"/>';
    }
  }
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    defaults + imgDefaults + overrides + '</Types>';
}

const ROOT_RELS =
  '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
  '</Relationships>';

const SETTINGS =
  '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
  '<w:defaultTabStop w:val="720"/>' +
  '</w:settings>';

// ─── Download ─────────────────────────────────────────────────────────────────

async function downloadDocx() {
  if (!savedTags.length) return;
  const btn = document.getElementById('downloadBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Building...';
  btn.disabled = true;

  try {
    const enc = s => new TextEncoder().encode(s);
    const zipFiles = [];

    // Process photos — resize and convert to bytes
    const imgRids   = [];  // relationship IDs per tag (null if no photo)
    const imgPaths  = [];  // relative paths in word/ folder
    const imgExts   = [];  // extensions for content types

    for (let i = 0; i < savedTags.length; i++) {
      const tag = savedTags[i];
      if (tag.photo) {
        // Resize to reasonable size first
        const resized = await resizePhoto(tag.photo, 200, 250);
        const parsed  = parseDataUrl(resized);
        if (parsed) {
          const rid  = 'rId' + (i + 2);   // rId2, rId3, ...
          const path = 'media/img' + i + '.' + parsed.ext;
          imgRids.push(rid);
          imgPaths.push(path);
          imgExts.push(parsed.ext);
          zipFiles.push({ name: 'word/' + path, data: base64ToBytes(parsed.base64) });
        } else {
          imgRids.push(null);
        }
      } else {
        imgRids.push(null);
      }
    }

    // Filter only tags that actually have a rid
    const usedRids  = imgRids.filter(Boolean);
    const usedPaths = imgPaths;

    zipFiles.push({ name: '[Content_Types].xml',          data: enc(buildContentTypes(imgExts)) });
    zipFiles.push({ name: '_rels/.rels',                  data: enc(ROOT_RELS) });
    zipFiles.push({ name: 'word/document.xml',            data: enc(buildDocumentXml(savedTags, imgRids)) });
    zipFiles.push({ name: 'word/_rels/document.xml.rels', data: enc(buildWordRels(usedRids, usedPaths)) });
    zipFiles.push({ name: 'word/settings.xml',            data: enc(SETTINGS) });

    const zip = buildZip(zipFiles);
    const blob = new Blob([zip], {
      type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'name-tags.docx';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    showToast('✓ Downloaded name-tags.docx');
  } catch (err) {
    console.error(err);
    alert('Download error: ' + err.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = savedTags.length === 0;
  }
}

updatePreview();
