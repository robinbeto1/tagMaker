<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Associate Name Tag Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#2d7a3a;--green-light:#3d9a4c;--green-filled:#1a5c26;
    --bg:#1a1a1a;--panel:#242424;--border:#333;
    --text:#e8e8e8;--muted:#888;--accent:#f5c842;--blue-btn:#4a9eff;
    --tag-blue:#1a4a8a;--tag-blue-filled:#0d2e5e;--tag-blue-cell:#b8d4f0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:24px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:4px;color:var(--accent);margin-bottom:4px;}
  .subtitle{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:32px;max-width:1100px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:24px;}
  .panel h2{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  label{display:block;font-size:0.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
  input[type="text"]{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;border-radius:2px;margin-bottom:16px;outline:none;transition:border-color 0.2s;}
  input[type="text"]:focus{border-color:var(--green-light);}
  .dept-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
  .dept-btn{padding:9px 8px;border:1px solid var(--border);background:#1a1a1a;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all 0.15s;text-align:center;user-select:none;}
  .dept-btn:hover{border-color:var(--green-light);color:var(--text);}
  .dept-btn.active{background:var(--green-filled);border-color:var(--green-light);color:#fff;font-weight:600;}
  .photo-area{width:100%;aspect-ratio:3/4;background:#111;border:2px dashed var(--border);border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-bottom:16px;overflow:hidden;position:relative;transition:border-color 0.2s;}
  .photo-area:hover{border-color:var(--green-light);}
  .photo-area img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .photo-placeholder{color:var(--muted);font-size:0.72rem;letter-spacing:1px;text-align:center;font-family:'IBM Plex Mono',monospace;}
  .photo-placeholder .icon{font-size:2rem;margin-bottom:8px;}
  input[type="file"]{display:none;}
  .btn{width:100%;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;padding:13px;cursor:pointer;border-radius:2px;transition:all 0.2s;margin-top:8px;font-size:1.15rem;border:none;}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{background:var(--green-light);}
  .btn-dl{background:transparent;border:1px solid var(--blue-btn)!important;color:var(--blue-btn);}
  .btn-dl:hover:not(:disabled){background:var(--blue-btn);color:#000;}
  .btn-outline{background:transparent;border:1px solid var(--accent)!important;color:var(--accent);}
  .btn-outline:hover{background:var(--accent);color:#000;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .type-wrap{display:flex;gap:8px;margin-bottom:16px;}
  .type-btn{flex:1;padding:9px 6px;border:1px solid var(--border);background:#1a1a1a;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:0.68rem;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all 0.15s;}
  .type-btn.on-green{border-color:var(--green-light);background:var(--green-filled);color:#fff;}
  .type-btn.on-blue{border-color:var(--blue-btn);background:var(--tag-blue-filled);color:#7ec8ff;}
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;}
  .tag-container{background:#2a2a2a;border:1px solid var(--border);border-radius:4px;padding:32px;display:flex;flex-direction:column;align-items:center;}
  .name-tag{width:520px;background:var(--green);border-radius:6px;padding:8px;display:flex;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .name-tag.blue-tag{background:var(--tag-blue);}
  .tag-photo{width:90px;min-width:90px;border-radius:3px;overflow:hidden;}
  .tag-photo img{width:90px;height:110px;object-fit:cover;display:block;}
  .tag-photo-placeholder{width:90px;height:110px;background:#bbb;display:flex;align-items:center;justify-content:center;color:#666;font-size:2rem;}
  .tag-body{flex:1;display:flex;flex-direction:column;gap:6px;}
  .tag-rows{display:flex;flex-direction:column;gap:5px;}
  .tag-row{display:flex;gap:5px;}
  .tag-cell{background:rgba(255,255,255,.15);border-radius:2px;padding:5px 4px;font-size:.56rem;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center;flex:1;min-height:26px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;}
  .tag-cell.trained{background:rgba(255,255,255,.9);color:#1a4d22;font-weight:600;}
  .blue-tag .tag-cell.trained{color:#0d2e5e;}
  .blue-tag .tag-cell:not(.trained){color:rgba(255,255,255,.4);}
  .tag-name-row{display:flex;justify-content:space-between;align-items:center;padding:4px 2px 2px;}
  .tag-name{font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;color:#fff;letter-spacing:1px;}
  .tag-username{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:rgba(255,255,255,.65);}
  .saved-wrap{width:100%;}
  .saved-header{font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .saved-tags{display:flex;flex-wrap:wrap;gap:20px;}
  .toast{position:fixed;bottom:32px;right:32px;background:#1a4d22;border:1px solid var(--green-light);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:.8rem;padding:12px 20px;border-radius:4px;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<h1>Name Tag Maker</h1>
<p class="subtitle">Associate Training Badge Generator</p>

<div class="layout">
  <div>
    <div class="panel">
      <h2>Associate Info</h2>
      <label>Last Name, First Name</label>
      <input type="text" id="fullName" placeholder="e.g. patel, jinalben" oninput="updatePreview()">
      <label>Username / ID</label>
      <input type="text" id="username" placeholder="e.g. jinalbee" oninput="updatePreview()">
      <label>Employment Type</label>
      <div class="type-wrap">
        <button id="typeTemp" class="type-btn on-green" onclick="setType('temp')">🟢 Seasonal / Temp</button>
        <button id="typePerm" class="type-btn" onclick="setType('perm')">🔵 Permanent</button>
      </div>
      <label>Photo (optional)</label>
      <div class="photo-area" id="photoArea" onclick="document.getElementById('photoInput').click()">
        <div class="photo-placeholder"><div class="icon">📷</div><div>Click to upload</div></div>
      </div>
      <input type="file" id="photoInput" accept="image/*" onchange="handlePhoto(event)">
      <label>Departments Trained In</label>
      <div class="dept-grid" id="deptGrid"></div>
      <button class="btn btn-green" onclick="saveTag()">＋ Save Tag</button>
      <button class="btn btn-dl" id="downloadBtn" onclick="downloadDocx()" disabled>⬇ Download Saved Tags (.docx)</button>
      <button class="btn btn-outline" onclick="window.print()">🖨 Print Preview</button>
    </div>
  </div>
  <div>
    <div class="panel">
      <h2>Live Preview</h2>
      <div class="preview-wrap">
        <div class="tag-container"><div id="liveTag"></div></div>
        <div class="saved-wrap">
          <div class="saved-header" id="savedHeader">Saved Tags</div>
          <div class="saved-tags" id="savedTagsEl">
            <div style="color:var(--muted);font-size:.8rem;font-family:'IBM Plex Mono',monospace;">No tags saved yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── Pure-JS minimal docx builder (no dependencies) ──────────────────────────
// Builds a valid .docx (Office Open XML) ZIP file entirely in the browser.

const DEPARTMENTS = ['PICK','WS','PS','LA','SD','ARSAW','STOW','PACK','PP','PG','AFM','SINGLES','RECIEVE'];
const ROW1 = ['PICK','WS','PS','LA','SD','ARSAW','STOW'];
const ROW2 = ['PACK','PP','PG','','AFM','SINGLES','RECIEVE'];

let selectedDepts = new Set();
let photoDataUrl = null;
let savedTags = [];
let isPermanent = false;

// Dept buttons
const grid = document.getElementById('deptGrid');
DEPARTMENTS.forEach(key => {
  const btn = document.createElement('button');
  btn.className = 'dept-btn';
  btn.textContent = key;
  btn.onclick = () => {
    selectedDepts.has(key) ? selectedDepts.delete(key) : selectedDepts.add(key);
    btn.classList.toggle('active', selectedDepts.has(key));
    updatePreview();
  };
  grid.appendChild(btn);
});

function setType(type) {
  isPermanent = type === 'perm';
  document.getElementById('typeTemp').className = 'type-btn' + (!isPermanent ? ' on-green' : '');
  document.getElementById('typePerm').className = 'type-btn' + (isPermanent ? ' on-blue' : '');
  updatePreview();
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    photoDataUrl = ev.target.result;
    document.getElementById('photoArea').innerHTML = `<img src="${photoDataUrl}">`;
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function cellHTML(key, depts) {
  if (!key) return `<div class="tag-cell" style="background:transparent;"></div>`;
  return `<div class="tag-cell ${depts.has(key) ? 'trained' : ''}">${key}</div>`;
}

function buildTagHTML(name, username, depts, photo, perm) {
  const photoHTML = photo
    ? `<div class="tag-photo"><img src="${photo}"></div>`
    : `<div class="tag-photo"><div class="tag-photo-placeholder">👤</div></div>`;
  return `<div class="name-tag${perm ? ' blue-tag' : ''}">
    ${photoHTML}
    <div class="tag-body">
      <div class="tag-rows">
        <div class="tag-row">${ROW1.map(k => cellHTML(k, depts)).join('')}</div>
        <div class="tag-row">${ROW2.map(k => cellHTML(k, depts)).join('')}</div>
      </div>
      <div class="tag-name-row">
        <span class="tag-name">${name || 'last, first'}</span>
        <span class="tag-username">${username || 'username'}</span>
      </div>
    </div>
  </div>`;
}

function updatePreview() {
  document.getElementById('liveTag').innerHTML = buildTagHTML(
    document.getElementById('fullName').value,
    document.getElementById('username').value,
    selectedDepts, photoDataUrl, isPermanent
  );
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function saveTag() {
  const name = document.getElementById('fullName').value.trim();
  if (!name) { alert('Please enter a name first.'); return; }
  savedTags.push({
    name, username: document.getElementById('username').value.trim(),
    depts: new Set(selectedDepts), photo: photoDataUrl, permanent: isPermanent
  });
  renderSaved();
  showToast(`✓ Saved: ${name}`);
}

function renderSaved() {
  const container = document.getElementById('savedTagsEl');
  const btn = document.getElementById('downloadBtn');
  document.getElementById('savedHeader').textContent = savedTags.length
    ? `Saved Tags (${savedTags.length})` : 'Saved Tags';
  btn.disabled = savedTags.length === 0;
  container.innerHTML = '';
  if (!savedTags.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:.8rem;font-family:\'IBM Plex Mono\',monospace;">No tags saved yet.</div>';
    return;
  }
  savedTags.forEach((tag, i) => {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:inline-flex;flex-direction:column;gap:6px;align-items:center;';
    const tagDiv = document.createElement('div');
    tagDiv.style.cssText = 'transform:scale(0.48);transform-origin:top left;margin-bottom:-58px;margin-right:-272px;';
    tagDiv.innerHTML = buildTagHTML(tag.name, tag.username, tag.depts, tag.photo, tag.permanent);
    const del = document.createElement('button');
    del.textContent = '✕ Remove';
    del.style.cssText = 'font-family:"IBM Plex Mono",monospace;font-size:.65rem;background:transparent;border:1px solid #444;color:#888;padding:3px 10px;cursor:pointer;border-radius:2px;margin-top:54px;';
    del.onclick = () => { savedTags.splice(i, 1); renderSaved(); };
    wrap.appendChild(tagDiv); wrap.appendChild(del); container.appendChild(wrap);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// DOCX GENERATION — pure JS, builds the XML + ZIP in-browser, no CDN needed
// ─────────────────────────────────────────────────────────────────────────────

function hexToWmlColor(hex) {
  // returns 6-char uppercase hex suitable for w:color/@w:val
  return hex.replace('#','').toUpperCase().padStart(6,'0');
}

function tagTableXml(tag) {
  const perm = tag.permanent;
  const BASE   = perm ? '1A4A8A' : '2D7A3A';
  const DARK   = perm ? '0D2E5E' : '1A5C26';
  const LIGHT  = perm ? 'B8D4F0' : 'C8E6C9';
  const WHITE  = 'FFFFFF';
  const TXTDRK = perm ? '0d2e5e' : '2d5a35';

  function nb() { return `<w:top w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:left w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:bottom w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:right w:val="none" w:sz="0" w:space="0" w:color="auto"/>`; }

  function deptCell(key, trained, blank) {
    const fill = blank ? BASE : (trained ? DARK : LIGHT);
    const tc = trained ? WHITE : TXTDRK;
    const txt = blank ? '' : key;
    const bold = trained ? '<w:b/>' : '';
    const rightBorder = blank
      ? `<w:right w:val="none" w:sz="0" w:space="0" w:color="auto"/>`
      : `<w:right w:val="single" w:sz="4" w:space="0" w:color="${BASE}"/>`;
    return `<w:tc>
      <w:tcPr>
        <w:tcW w:w="880" w:type="dxa"/>
        <w:tcBorders><w:top w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:left w:val="none" w:sz="0" w:space="0" w:color="auto"/><w:bottom w:val="none" w:sz="0" w:space="0" w:color="auto"/>${rightBorder}</w:tcBorders>
        <w:shd w:val="clear" w:color="auto" w:fill="${fill}"/>
        <w:tcMar><w:top w:w="55" w:type="dxa"/><w:left w:w="55" w:type="dxa"/><w:bottom w:w="55" w:type="dxa"/><w:right w:w="55" w:type="dxa"/></w:tcMar>
        <w:vAlign w:val="center"/>
      </w:tcPr>
      <w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr>${bold}<w:color w:val="${tc}"/><w:sz w:val="14"/><w:szCs w:val="14"/><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr><w:t>${txt}</w:t></w:r></w:p>
    </w:tc>`;
  }

  function photoCell() {
    return `<w:tc>
      <w:tcPr>
        <w:tcW w:w="1160" w:type="dxa"/>
        <w:vMerge w:val="restart"/>
        <w:tcBorders>${nb()}</w:tcBorders>
        <w:shd w:val="clear" w:color="auto" w:fill="${BASE}"/>
        <w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="80" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="80" w:type="dxa"/></w:tcMar>
        <w:vAlign w:val="center"/>
      </w:tcPr>
      <w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:color w:val="AAAAAA"/><w:sz w:val="16"/><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr><w:t>[ photo ]</w:t></w:r></w:p>
    </w:tc>`;
  }

  function photoCellContinue() {
    return `<w:tc>
      <w:tcPr>
        <w:tcW w:w="1160" w:type="dxa"/>
        <w:vMerge/>
        <w:tcBorders>${nb()}</w:tcBorders>
        <w:shd w:val="clear" w:color="auto" w:fill="${BASE}"/>
      </w:tcPr>
      <w:p/>
    </w:tc>`;
  }

  const r1 = ROW1.map(k => deptCell(k, tag.depts.has(k), false)).join('');
  const r2 = ROW2.map(k => k === '' ? deptCell('', false, true) : deptCell(k, tag.depts.has(k), false)).join('');

  const nameXml = `<w:tc>
    <w:tcPr>
      <w:tcW w:w="7320" w:type="dxa"/>
      <w:gridSpan w:val="8"/>
      <w:tcBorders>${nb()}</w:tcBorders>
      <w:shd w:val="clear" w:color="auto" w:fill="${BASE}"/>
      <w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>
      <w:vAlign w:val="center"/>
    </w:tcPr>
    <w:p><w:r>
      <w:rPr><w:b/><w:color w:val="FFFFFF"/><w:sz w:val="22"/><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr>
      <w:t xml:space="preserve">${escXml(tag.name || '')}        ${escXml(tag.username || '')}</w:t>
    </w:r></w:p>
  </w:tc>`;

  const typeLabel = perm ? '[PERMANENT]' : '[SEASONAL]';
  const typeLabelColor = perm ? '1A4A8A' : '2D7A3A';

  return `
  <w:p><w:pPr><w:spacing w:before="0" w:after="140"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="22"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t xml:space="preserve">${escXml(tag.name)}</w:t></w:r>
    <w:r><w:rPr><w:sz w:val="18"/><w:color w:val="777777"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t xml:space="preserve">${tag.username ? '  ·  ' + escXml(tag.username) : ''}</w:t></w:r>
    <w:r><w:rPr><w:b/><w:sz w:val="16"/><w:color w:val="${typeLabelColor}"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t xml:space="preserve">  ${typeLabel}</w:t></w:r>
  </w:p>
  ${tag.depts.size ? `<w:p><w:pPr><w:spacing w:before="0" w:after="120"/></w:pPr>
    <w:r><w:rPr><w:b/><w:sz w:val="16"/><w:color w:val="444444"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/></w:rPr><w:t>Trained: </w:t></w:r>
    <w:r><w:rPr><w:sz w:val="16"/><w:color w:val="${BASE}"/><w:rFonts w:ascii="Courier New" w:hAnsi="Courier New"/></w:rPr><w:t>${[...tag.depts].map(escXml).join('  ·  ')}</w:t></w:r>
  </w:p>` : ''}
  <w:tbl>
    <w:tblPr>
      <w:tblW w:w="7320" w:type="dxa"/>
      <w:tblBorders><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders>
      <w:tblCellMar><w:top w:w="0" w:type="dxa"/><w:left w:w="0" w:type="dxa"/><w:bottom w:w="0" w:type="dxa"/><w:right w:w="0" w:type="dxa"/></w:tblCellMar>
    </w:tblPr>
    <w:tblGrid>
      <w:gridCol w:w="1160"/><w:gridCol w:w="880"/><w:gridCol w:w="880"/>
      <w:gridCol w:w="880"/><w:gridCol w:w="880"/><w:gridCol w:w="880"/>
      <w:gridCol w:w="880"/><w:gridCol w:w="880"/>
    </w:tblGrid>
    <w:tr><w:trPr><w:trHeight w:val="380" w:hRule="exact"/></w:trPr>${photoCell()}${r1}</w:tr>
    <w:tr><w:trPr><w:trHeight w:val="380" w:hRule="exact"/></w:trPr>${photoCellContinue()}${r2}</w:tr>
    <w:tr><w:trPr><w:trHeight w:val="440" w:hRule="exact"/></w:trPr>${nameXml}</w:tr>
  </w:tbl>`;
}

function escXml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildDocumentXml(tags) {
  const body = tags.map((tag, i) => {
    const spacer = i > 0 ? `<w:p><w:pPr><w:spacing w:before="480" w:after="0"/></w:pPr></w:p>` : '';
    const pgBreak = (i < tags.length - 1 && (i + 1) % 3 === 0)
      ? `<w:p><w:r><w:br w:type="page"/></w:r></w:p>` : '';
    return spacer + tagTableXml(tag) + pgBreak;
  }).join('');

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:cx="http://schemas.microsoft.com/office/drawing/2014/chartex"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:aink="http://schemas.microsoft.com/office/drawing/2016/ink"
  xmlns:am3d="http://schemas.microsoft.com/office/drawing/2017/model3d"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:oel="http://schemas.microsoft.com/office/2019/extlst"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w10="urn:schemas-microsoft-com:office:word"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  xmlns:w15="http://schemas.microsoft.com/office/word/2012/wordml"
  xmlns:w16cex="http://schemas.microsoft.com/office/word/2018/wordml/cex"
  xmlns:w16cid="http://schemas.microsoft.com/office/word/2016/wordml/cid"
  xmlns:w16="http://schemas.microsoft.com/office/word/2018/wordml"
  xmlns:w16sdtdh="http://schemas.microsoft.com/office/word/2020/wordml/sdtdatahash"
  xmlns:w16se="http://schemas.microsoft.com/office/word/2015/wordml/symex"
  xmlns:wpg="http://schemas.microsoft.com/office/word/2010/wordprocessingGroup"
  xmlns:wpi="http://schemas.microsoft.com/office/word/2010/wordprocessingInk"
  xmlns:wne="http://schemas.microsoft.com/office/word/2006/wordml"
  xmlns:wps="http://schemas.microsoft.com/office/word/2010/wordprocessingShape"
  mc:Ignorable="w14 w15 w16se w16cid w16 w16cex w16sdtdh wp14">
  <w:body>
    ${body}
    <w:sectPr>
      <w:pgSz w:w="12240" w:h="15840"/>
      <w:pgMar w:top="1080" w:right="1080" w:bottom="1080" w:left="1080" w:header="720" w:footer="720" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>`;
}

const CONTENT_TYPES = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/settings.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.settings+xml"/>
</Types>`;

const RELS = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

const WORD_RELS = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/settings" Target="settings.xml"/>
</Relationships>`;

const SETTINGS = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:settings xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:defaultTabStop w:val="720"/>
</w:settings>`;

async function downloadDocx() {
  if (!savedTags.length) return;

  const btn = document.getElementById('downloadBtn');
  const orig = btn.textContent;
  btn.textContent = '⏳ Building...';
  btn.disabled = true;

  try {
    const docXml = buildDocumentXml(savedTags);

    // Build zip using JSZip
    const zip = new JSZip();
    zip.file('[Content_Types].xml', CONTENT_TYPES);
    zip.file('_rels/.rels', RELS);
    zip.file('word/document.xml', docXml);
    zip.file('word/_rels/document.xml.rels', WORD_RELS);
    zip.file('word/settings.xml', SETTINGS);

    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });

    // Trigger download using anchor trick — works in sandboxed iframes
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'associate-name-tags.docx';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

    showToast('✓ Downloaded associate-name-tags.docx');
  } catch (err) {
    console.error(err);
    alert('Error: ' + err.message);
  } finally {
    btn.textContent = orig;
    btn.disabled = savedTags.length === 0;
  }
}

updatePreview();
</script>
</body>
</html>
